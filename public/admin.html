<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Gestión - Hospital Luis A. Güemes</title>
    <style>
        body { 
            margin: 0; 
            font-family: sans-serif; 
            background-color: #4a2c35; 
            color: #333; 
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* CAMBIO CLAVE: Ajustamos ancho y alto distintos para forzar el óvalo */
            width: 550px;  /* Más ancho */
            height: 480px; /* Menos alto */
            border-radius: 50%; /* Esto estira las esquinas convirtiéndolo en un óvalo */
            overflow: hidden; /* Corta lo que quede fuera del óvalo si es necesario */
            background-image: url('../img/logo.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.15; 
            z-index: -1;   
            pointer-events: none;
        }

        /* Barra superior */
        .navbar { 
            background: white; 
            padding: 15px 50px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .navbar img { 
            width: 50px; 
        }
        .nav-links { 
            display: flex; 
            gap: 20px; 
            font-weight: bold; 
        }

        /* Título */
        .page-title { 
            text-align: center; 
            color: white; 
            padding: 40px 0; 
        }
        .page-title h1 { 
            margin: 0; 
            font-size: 2.5em; 
        }

        /* Contenedor de la tabla */
        .table-container { 
            max-width: 1000px; 
            margin: 0 auto 50px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background-color: #332126; color: white; padding: 15px; }
        td { border-bottom: 1px solid #ddd; padding: 15px; text-align: center; }

        /* Estilo del botón CAMBIAR */
        .dropdown-container { position: relative; display: inline-block; }
        .dropdown-toggle {
            background-color: #09cf37;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .dropdown-toggle:hover { background-color: #037b23; }

        /* Menú desplegable */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 150px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 6px;
            z-index: 1000;
            text-align: left;
        }
        .dropdown-item { padding: 12px; display: block; cursor: pointer; color: #333; }
        .dropdown-item:hover { background-color: #f1f1f1; }
        .dropdown-item.selected { background-color: #09cf37; color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <img src="./img/logo.jpg" alt="Logo">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
        </div>
    </div>

    <div class="page-title">
        <h1>Donaciones - Panel de Gestión</h1>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Fecha de Donación</th>
                    <th>DNI</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Estado Actual</th>
                    <th>Cambiar Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-donaciones"></tbody>
        </table>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
